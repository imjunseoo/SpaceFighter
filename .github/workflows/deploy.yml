name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # 레포지토리의 기본 브랜치명(main 또는 master)에 맞춰주세요.

  # 브라우저에서 직접 배포를 실행할 수 있는 옵션 추가
  workflow_dispatch:

# GITHUB_TOKEN에 필요한 권한 설정
permissions:
  contents: read
  pages: write
  id-token: write

# 배포 프로세스 동시 실행 방지
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 현재 디렉토리의 모든 정적 파일 업로드
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
